<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
<style>
.TRUE
{	fill:
		#fff;
	}

.FALSE
{	fill:
		#000;
	}

.Y
{	fill:
		#ec1;
	}

.B
{	fill:
		#127;
	}

.K
{	fill:
		#111;
	}
	
.Q
{	stroke:
		#6ff;
	stroke-width:
		calc(	0.1px	);
	}

.line
{	fill:
		none;
	stroke-linecap:
		round;
	stroke-linejoin:
		round;
	}
	</style>
<defs>
	<path id="rect" d="M0 0h60v40H0z"/>
	<path id="slant" d="M26 24v-2l15 2v2z"/>
	<mask id="arrow">
		<use class="TRUE" href="#rect"/>
		<g class="FALSE" fill-rule="evenodd">
			<circle r="16" cx="15" cy="5"/>
			<circle r="16" cx="45" cy="5"/>
			<circle r="14" cx="30" cy="29"/>
			</g>
		</mask>
	<mask id="spear">
		<use class="TRUE" href="#rect"/>
		<g class="FALSE">
			<circle r="22" cx="55" cy="25"/>
			</g>
		<g class="TRUE">
			<use href="#slant"/>
			</g>
		<g class="FALSE">
			<path id="rect" d="M0 0h30v40H0z"/>
			<circle r="20" cx="55" cy="25"/>
			</g>
		</mask>
	</defs>
<use class="B" href="#rect"/>
<path class="Y" d="M20 0h20v40H20z"/>
<g id="trident">
	<circle class="K" r="16" cx="30" cy="5" mask="url(#arrow)"/>
	<g class="K" mask="url(#spear)">
		<use href="#rect"/>
		</g>
	</g>
</svg>