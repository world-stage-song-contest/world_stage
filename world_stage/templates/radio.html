{% extends "base.html" %}
{% block title %}Radio{% endblock %}
{% block headercontents %}
<link href="https://cdn.jsdelivr.net/npm/video.js@8.23.3/dist/video-js.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/video.js@8.23.3/dist/video.min.js"></script>
<link rel="stylesheet" href="{{ static('css/radio.css') }}">
{% endblock %}
{% block content %}
<div id="radio">
    <div id="player-shell">
        <video id="radio-player" class="video-js vjs-default-skin" controls preload="auto" playsinline></video>
        <div id="tune-in">
            <img src="{{ static('images/radio.png') }}" alt="Radio">
            <button id="tune-in-button">&#9654; Tune in</button>
        </div>
        <div id="up-next">
            <p>Up next in <strong id="up-next-countdown">–:––</strong></p>
        </div>
    </div>
    <div id="now-playing">
        <span id="np-title"></span>
        <span id="np-artist"></span>
        <span id="np-origin"></span>
    </div>
    <p id="radio-error"></p>
</div>

<script>window.SCROBBLE_ENABLED = {{ 'true' if scrobble_enabled else 'false' }};</script>
<script src="{{ static('js/radio.js') }}"></script>
{% endblock %}
