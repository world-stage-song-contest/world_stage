<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" fill="none">
<style>
.Y
{	stroke:
		#fc0;
	stroke-width:
		21;
	}

.K
{	stroke:
		#111;
	stroke-width:
		15;
	}

.W
{	fill:
		#fff;
	}

.G
{	fill:
		#184;
	}

.R
{	fill:
		#c13;
	}

.o
{	transform:
		translate(calc(50px/2),calc(50px/2))
		rotate(atan2(-2, 2));
	transform-origin:
		calc(50px/2),
		calc(50px/2);
	}

.p
{	transform:
		translate(
			calc(
				var(--n) * 52px / 3
				),
			calc(
				(21px - 7px * sqrt(5) ) / 8
				)
			)
	}

.q
{	stroke:
		#0f0;
	stroke-width:
		.1;
	transform:
		rotate(atan2(-2, 2));
	transform-origin:
		50px
		50px;
	}
</style>
	<defs>
		<clipPath id="f">
			<path d="m0 0h50v50H0z"/>
			</clipPath>
		<g id="s" transform="scale(7)">
			<g id="B">
				<path id="A" class="W" d="M0-1v1h.5" transform="rotate(18 0-1)"/>
				<use href="#A" transform="scale(-1 1)"/>
				</g>
			<g id="C">
				<use href="#B" transform="rotate(72)"/>
				<use href="#B" transform="rotate(216)"/>
				</g>
			<use href="#C" transform="rotate(72)"/>
			</g>
		</defs>
	<g clip-path="url(#f)">
		<path class="G" d="M0 50V0H50"/>
		<path class="R" d="M50 0V50H0"/>
		<path class="Y" d="M0 50 50 0"/>
		<path class="K" d="M0 50 50 0"/>
		<g class="o">
			<use href="#s" class="p" style="--n:1"/>
			<use href="#s" class="p" style="--n:-1"/>
			</g>
		</g>
	<path class="q" d="M50 0V50"/>
	</svg>